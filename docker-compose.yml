services:
  postgres:
    image: postgres:16-alpine
    container_name: korean_ai_trainer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: korean
      POSTGRES_PASSWORD: korean
      POSTGRES_DB: korean_trainer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
