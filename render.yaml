databases:
  - name: korean-ai-db
    databaseName: korean_trainer
    user: korean_user
    plan: free

services:
  - type: web
    name: korean-ai-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: korean-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://korean-ai-web.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_TEXT_MODEL
        value: gpt-5.2
      - key: AI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: AI_TTS_MODEL
        value: gpt-4o-mini-tts

  - type: web
    name: korean-ai-web
    env: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://korean-ai-api.onrender.com
